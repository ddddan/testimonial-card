<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GreatFrontEnd Projects - Testimonial Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="img/favicon.ico" sizes="any" />

</head>

<body>
  <div class="container">
    <div class="card">
      <div class="profile">
        <img class="profile-thumbnail" src="img/profile-thumbnail.png" alt="Profile Thumbnail" />
        <div class="text-pair">
          <div class="name">Sarah Dole</div>
          <div class="username">@sarahdole</div>
        </div>
      </div>
      <div class="testimonial">
        I've been searching for high-quality abstract images for my design projects,
        and I'm thrilled to have found this platform. The variety and depth of creativity are astounding!
      </div>
    </div>
  </div>

  <!-- Attribute this challenge to yourself! -->
  <div class="credits" data-gfe-screenshot-exclude="true">
    A challenge by
    <a href="https://www.greatfrontend.com/projects?ref=challenges" target="_blank">GreatFrontEnd Projects</a>. Built by
    <a href="https://www.greatfrontend.com/projects/u/username" target="_blank">ddddan</a>.
  </div>
</body>

</html>
